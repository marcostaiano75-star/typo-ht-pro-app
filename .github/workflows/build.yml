name: Build Flet APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas
          pip install flet --upgrade --no-cache-dir  # <--- FORZA L'ULTIMA VERSIONE

      - name: Build APK
        run: |
          flet build apk --icon assets/icon.png

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: typo-ht-pro-android
          path: |
            dist/apk/*.apk
